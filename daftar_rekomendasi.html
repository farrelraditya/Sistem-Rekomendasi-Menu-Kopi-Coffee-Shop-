<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Rekomendasi - Sistem Rekomendasi Kopi GERD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">G</div>
                    <span>GERD CoffeeRec</span>
                </div>
                
                <div class="header-actions">
                    <a href="#" id="btnLogout" class="btn btn-out">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <section class="hero" style="padding: 0;">
        <div class="hero-glow-1"></div>
        <div class="hero-glow-2"></div>
        
        <div class="container recommendation-wrapper">
            
            <div class="recommendation-header">
                <h1>Rekomendasi Coffee Shop</h1>
                <p>💡 <strong>Info:</strong> Urutan teratas adalah Coffee Shop yang memiliki menu aman untuk lambung paling banyak.</p>
                <div id="statusGerdUser" style="margin-top: 15px; padding: 10px; background-color: #e2e8f0; border-radius: 8px; display: inline-block; font-weight: bold; color: var(--foreground);">
                    Menganalisis profil lambung Anda...
                </div>
            </div>

            <div class="shops-grid" id="gridRekomendasi">
                </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>Informasi Seputar Website &copy; 2026 - Skripsi Universitas Pelita Harapan Medan</p>
        </div>
    </footer>

    <script type="module">
        // 1. Import Firebase, Firestore, dan Auth
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 2. KONFIGURASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCqlUQaayGPfVIgZxr_tGuHgwr-h9YdXtI",
            authDomain: "sistem-rekomendasi-kopi-gerd.firebaseapp.com",
            projectId: "sistem-rekomendasi-kopi-gerd",
            storageBucket: "sistem-rekomendasi-kopi-gerd.firebasestorage.app",
            messagingSenderId: "955125085378",
            appId: "1:955125085378:web:d6211bb582ace6e557775b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Header Scroll Effect
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Fitur Logout
        const btnLogout = document.getElementById('btnLogout');
        if (btnLogout) {
            btnLogout.addEventListener('click', (e) => {
                e.preventDefault();
                signOut(auth).then(() => {
                    window.location.href = "login.html";
                });
            });
        }

        // ==========================================
        // 3. ALGORITMA COSINE SIMILARITY
        // ==========================================
        function hitungCosineSimilarity(vektorUser, vektorMenu) {
            let dotProduct = 0, magnitudeUser = 0, magnitudeMenu = 0;
            for (let i = 0; i < vektorUser.length; i++) {
                dotProduct += (vektorUser[i] * vektorMenu[i]);
                magnitudeUser += Math.pow(vektorUser[i], 2);
                magnitudeMenu += Math.pow(vektorMenu[i], 2);
            }
            magnitudeUser = Math.sqrt(magnitudeUser);
            magnitudeMenu = Math.sqrt(magnitudeMenu);
            if (magnitudeUser === 0 || magnitudeMenu === 0) return 0;
            return dotProduct / (magnitudeUser * magnitudeMenu);
        }

        // ==========================================
        // 4. FETCH DATA & PROSES RANKING (DINAMIS BERDASARKAN GERD)
        // ==========================================
        async function tampilkanRekomendasi(profilIdealAman) {
            const grid = document.getElementById('gridRekomendasi');
            grid.innerHTML = '<p style="text-align:center; width: 100%;">Sedang menghitung kecocokan menu dengan lambung Anda...</p>';

            try {
                const menuRef = collection(db, "MenuKopi");
                const snapshot = await getDocs(menuRef);
                const rekapToko = {};

                // A. Menghitung skor setiap menu terhadap vektor user
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const vektorMenu = [data.bobot_biji, data.bobot_roast, data.bobot_seduh];
                    const skor = hitungCosineSimilarity(profilIdealAman, vektorMenu);

                    if (!rekapToko[data.id_toko]) {
                        rekapToko[data.id_toko] = { nama: data.id_toko, totalSkor: 0, jumlahMenu: 0 };
                    }
                    rekapToko[data.id_toko].totalSkor += skor;
                    rekapToko[data.id_toko].jumlahMenu += 1;
                });

                // B. Menghitung rata-rata skor keamanan tiap toko
                const rankingToko = Object.values(rekapToko).map(toko => {
                    toko.skorRataRata = toko.totalSkor / toko.jumlahMenu;
                    return toko;
                });

                // C. Mengurutkan toko dari skor tertinggi ke terendah
                rankingToko.sort((a, b) => b.skorRataRata - a.skorRataRata);

                // D. Cetak ke HTML
                grid.innerHTML = ''; 
                
                const gambarToko = {
                    "Starbucks": "images_coffeeshop/Starbucks_Ismud.jpeg",
                    "Fore": "images_coffeeshop/Fore_Mansyur.jpeg",
                    "Kopi Kenangan": "images_coffeeshop/KopKen_Multatuli.jpeg",
                    "Janji Jiwa": "images_coffeeshop/Janji_Jiwa_Karya_W.jpeg"
                };

                rankingToko.forEach((toko, index) => {
                    const rank = index + 1;
                    let badgeColor = '';
                    let badgeText = `#${rank} Paling Aman`;

                    if (rank === 2) {
                        badgeColor = 'style="background-color: var(--secondary);"';
                        badgeText = `#${rank} Aman`;
                    } else if (rank > 2) {
                        badgeColor = 'style="background-color: var(--accent);"';
                        badgeText = `#${rank} Cukup Aman`;
                    }

                    const imgSrc = gambarToko[toko.nama] || "https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=800";
                    const linkKeMenu = `daftar_menu.html?id=${encodeURIComponent(toko.nama)}`; 

                    const cardHTML = `
                        <div class="shop-card">
                            <div class="shop-card-header">
                                <h3>${toko.nama}</h3>
                                <p style="font-size: 12px; color: gray; margin-top: 5px;">Tingkat Kecocokan: ${(toko.skorRataRata * 100).toFixed(1)}%</p>
                            </div>
                            <div class="shop-card-image">
                                <div class="rank-badge" ${badgeColor}>${badgeText}</div>
                                <img src="${imgSrc}" alt="Gambar ${toko.nama}">
                            </div>
                            <div class="shop-card-footer">
                                <a href="${linkKeMenu}" class="btn btn-primary" style="width: 100%; justify-content: center;">Lihat Menu</a>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHTML;
                });

            } catch (error) {
                console.error("Error mengambil data: ", error);
                grid.innerHTML = '<p style="color:red; text-align:center;">Gagal memuat rekomendasi. Periksa koneksi atau rules Firebase.</p>';
            }
        }

        // ==========================================
        // 5. PENGECEKAN USER AKTIF & EKSEKUSI
        // ==========================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User sedang login, ambil data profilnya dari Firestore
                const userDoc = await getDoc(doc(db, "Users", user.uid));
                const statusGerdUI = document.getElementById('statusGerdUser');

                if (userDoc.exists()) {
                    const tingkatGerd = userDoc.data().tingkatGerd;
                    let profilIdealAman = [1.0, 1.0, 1.0]; // Default Paling Aman

                    // Sesuaikan Vektor Target Rekomendasi berdasarkan Tingkat GERD
                    if (tingkatGerd === 1) {
                        statusGerdUI.innerHTML = "Profil Anda: Tingkat GERD 1 (Ringan)";
                        profilIdealAman = [0.5, 0.5, 0.5]; // Toleran terhadap asam
                    } else if (tingkatGerd === 2) {
                        statusGerdUI.innerHTML = "Profil Anda: Tingkat GERD 2 (Sedang)";
                        profilIdealAman = [0.8, 0.8, 0.8]; // Cukup butuh yang aman
                    } else if (tingkatGerd === 3) {
                        statusGerdUI.innerHTML = "Profil Anda: Tingkat GERD 3 (Berat)";
                        profilIdealAman = [1.0, 1.0, 1.0]; // Wajib sangat aman
                    }

                    // Jalankan algoritma rekomendasi dengan vektor profil yang sudah disesuaikan
                    tampilkanRekomendasi(profilIdealAman);

                } else {
                    // Kalau entah bagaimana user ini lolos tanpa isi kuesioner
                    window.location.href = "kuesioner.html";
                }
            } else {
                // Jika tidak ada user yang login, lempar ke halaman login
                window.location.href = "login.html";
            }
        });

    </script>
</body>
</html>
