<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Rekomendasi - Kopi GERD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Sistem Rekomendasi Kopi Aman Lambung</h1>
        <a href="index.html" class="btn-logout" style="color: white; text-decoration: underline; font-size: 14px;">Logout</a>
    </header>

    <main class="container" style="flex-direction: column; align-items: stretch;">
        <div class="info-text" style="background-color: #f39c12; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
            <p><strong>Rekomendasi Coffee Shop</strong> (Urutan Teratas adalah Coffee Shop yang Memiliki Menu Aman yang Paling Banyak)</p>
        </div>

        <div class="shop-grid">
            <div class="shop-card">
                <h3>Aote Coffee</h3>
                <div class="shop-image">
                    <p>GAMBAR</p>
                </div>
                <a href="#" class="btn-masuk" style="display: block; text-align: center; text-decoration: none; margin-top: 15px;">Lihat Menu</a>
            </div>

            <div class="shop-card">
                <h3>Kopi Kenangan</h3>
                <div class="shop-image">
                    <p>GAMBAR</p>
                </div>
                <a href="#" class="btn-masuk" style="display: block; text-align: center; text-decoration: none; margin-top: 15px;">Lihat Menu</a>
            </div>

            <div class="shop-card">
                <h3>Janji Jiwa</h3>
                <div class="shop-image">
                    <p>GAMBAR</p>
                </div>
                <a href="#" class="btn-masuk" style="display: block; text-align: center; text-decoration: none; margin-top: 15px;">Lihat Menu</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Sistem Rekomendasi Kopi Aman Lambung</p>
    </footer>
</body>
</html>
